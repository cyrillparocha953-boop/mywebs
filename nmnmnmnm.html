<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk Neon Runner - Mobile & PC</title>
    <style>
        body {
            margin: 0; background-color: #050505; color: #00f2ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        #game-wrapper { 
            display: flex; flex-direction: row; align-items: flex-start; gap: 10px; 
            max-width: 95vw;
        }
        /* Mobile adjustment for wrapper */
        @media (max-width: 800px) {
            #game-wrapper { flex-direction: column; align-items: center; }
            #leaderboard { width: 100% !important; height: 150px !important; }
            canvas { width: 90vw !important; height: auto !important; }
        }

        #game-container { position: relative; border: 4px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; border-radius: 8px; background: #000; }
        #leaderboard {
            width: 250px; height: 400px; border: 2px solid #ff007f;
            box-shadow: 0 0 15px #ff007f; background: rgba(10, 10, 10, 0.9);
            padding: 15px; overflow-y: auto; border-radius: 8px;
        }
        #leaderboard h3 { text-align: center; color: #ff007f; border-bottom: 1px solid #ff007f; padding-bottom: 10px; margin-top: 0; font-size: 16px; }
        .score-entry { display: flex; justify-content: space-between; font-size: 12px; margin: 5px 0; border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        
        canvas { display: block; background: #000; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); z-index: 20; text-align: center; padding: 10px; box-sizing: border-box; }
        input { background: transparent; border: 2px solid #ff007f; color: #00f2ff; padding: 10px; text-align: center; margin-bottom: 15px; outline: none; width: 80%; }
        button { background: #ff007f; color: white; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; }
        
        #ui-layer { position: absolute; top: 10px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; font-size: 12px; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
            <div id="ui-layer">
                <div>USER: <span id="userNameDisp">---</span></div>
                <div>SCORE: <span id="scoreVal">0</span></div>
            </div>

            <div id="login-screen" class="overlay">
                <h1 style="font-size: 24px;">NEON_IDENTITY</h1>
                <input type="text" id="playerNameInput" maxlength="12" placeholder="CODE_NAME">
                <button id="startBtn">INITIALIZE</button>
            </div>

            <div id="start-screen" class="overlay hidden">
                <h1>READY?</h1>
                <p>TAP SCREEN OR SPACE TO JUMP</p>
            </div>

            <div id="game-over" class="overlay hidden">
                <h1 style="color: #ff007f;">SYSTEM_FAILURE</h1>
                <p id="final-score"></p>
                <button onclick="location.reload()">RELOAD</button>
            </div>

            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="leaderboard">
            <h3>GLOBAL_RECORDS</h3>
            <div id="score-list">FETCHING...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCQF2laulY6pBKf0uXgHLNU2ymGl1p6h3U",
            authDomain: "talon-a0d64.firebaseapp.com",
            projectId: "talon-a0d64",
            storageBucket: "talon-a0d64.firebasestorage.app",
            messagingSenderId: "231672698092",
            appId: "1:231672698092:web:af84794c858756349bc1c9",
            measurementId: "G-QX0LCDG4F9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "leaderboard");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Dynamic Canvas Size for Mobile
        canvas.width = Math.min(window.innerWidth - 40, 700);
        canvas.height = 350;

        let gameActive = false, score = 0, playerName = "", gameSpeed = 5, obstacles = [], animationId;
        const player = { x: 30, y: 200, width: 35, height: 35, dy: 0, jumpForce: 11, gravity: 0.6, grounded: false };

        async function updateLeaderboardUI() {
            try {
                const q = query(colRef, orderBy("score", "desc"), limit(10));
                const querySnapshot = await getDocs(q);
                const scoreListDiv = document.getElementById("score-list");
                scoreListDiv.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement("div");
                    div.className = "score-entry";
                    div.innerHTML = `<span>${data.name}</span> <span>${data.score}</span>`;
                    scoreListDiv.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        async function saveGlobalScore(name, finalScore) {
            const querySnapshot = await getDocs(colRef);
            let userDocId = null, oldScore = 0;
            querySnapshot.forEach((doc) => {
                if(doc.data().name === name) { userDocId = doc.id; oldScore = doc.data().score; }
            });
            if (userDocId) {
                if (finalScore > oldScore) await updateDoc(doc(db, "leaderboard", userDocId), { score: finalScore });
            } else { await addDoc(colRef, { name: name, score: finalScore }); }
            updateLeaderboardUI();
        }

        document.getElementById("startBtn").onclick = () => {
            playerName = document.getElementById("playerNameInput").value.trim().toUpperCase();
            if(playerName) {
                document.getElementById("userNameDisp").innerText = playerName;
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("start-screen").classList.remove("hidden");
            }
        };

        class Obstacle {
            constructor() { 
                this.width = 25; 
                this.height = 30 + Math.random() * 40; 
                this.x = canvas.width; 
                this.y = canvas.height - this.height; 
            }
            draw() { 
                ctx.fillStyle = "#ff007f"; 
                ctx.fillRect(this.x, this.y, this.width, this.height); 
            }
            update() { this.x -= gameSpeed; }
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            player.dy += player.gravity; player.y += player.dy;
            if(player.y + player.height > canvas.height) { player.y = canvas.height - player.height; player.dy = 0; player.grounded = true; }
            
            ctx.fillStyle = "#00f2ff"; ctx.fillRect(player.x, player.y, player.width, player.height);

            if(Math.random() < 0.02 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 200)) obstacles.push(new Obstacle());

            obstacles.forEach((obs, i) => {
                obs.update(); obs.draw();
                if(player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obs.y + obs.height && player.y + player.height > obs.y) gameOver();
                if(obs.x + obs.width < 0) { obstacles.splice(i, 1); score++; document.getElementById("scoreVal").innerText = score; gameSpeed += 0.03; }
            });
            animationId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            document.getElementById("final-score").innerText = "FINAL SCORE: " + score;
            document.getElementById("game-over").classList.remove("hidden");
            saveGlobalScore(playerName, score);
        }

        // --- CONTROLS (PC & MOBILE) ---
        function handleAction() {
            if(!gameActive && !document.getElementById("start-screen").classList.contains("hidden")) {
                document.getElementById("start-screen").classList.add("hidden");
                gameActive = true; gameLoop();
            } else if(player.grounded && gameActive) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        }

        // Desktop
        window.addEventListener("keydown", (e) => { if(e.code === "Space") handleAction(); });
        // Mobile / Touch
        canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleAction(); }, {passive: false});

        updateLeaderboardUI();
    </script>
</body>
</html>
